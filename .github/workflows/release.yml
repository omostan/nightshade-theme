# ---------------------------------------------------------------------------
# Release — triggered when a version tag (v*) is pushed.
#
# Steps:
#   1. Build the plugin with Gradle  → build/distributions/nightshade-*.zip
#   2. Create a GitHub Release and attach the ZIP as a download asset.
#   3. Sign & publish to JetBrains Marketplace using configured GitHub Actions secrets.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   None required for the GitHub Release step.
#
# Optional secrets for JetBrains Marketplace publishing:
#   CERTIFICATE_CHAIN      — PEM-encoded certificate chain for plugin signing
#   PRIVATE_KEY            — PEM-encoded private key for plugin signing
#   PRIVATE_KEY_PASSWORD   — Passphrase for the private key
#   PUBLISH_TOKEN          — JetBrains Marketplace Hub permanent token
#
# How to trigger a release:
#   1. Update the pluginVersion in gradle.properties (for example: 1.0.2).
#     a.) git add gradle.properties
#     b.) git commit -m "chore: Release v1.0.2"
#
#   2. Create a tag that matches the pluginVersion with a 'v' prefix (for example: v1.0.2).
#     a.) git tag v1.0.2
#     b.) git push origin main --tags
# ---------------------------------------------------------------------------
name: Release

on:
  push:
    tags:
      - 'v*'

# Allow the job to create a GitHub Release and upload assets
permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history lets Gradle read tags for version info

      # ── 2. Java ─────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle ────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      # ── 4. Guard: Print wrapper Gradle version ──────────────────────────
      - name: Print Gradle wrapper version
        run: ./gradlew --version

      # ── 5. Build ─────────────────────────────────────────────────────────
      - name: Build plugin
        run: ./gradlew buildPlugin

      # ── 6. Resolve metadata ───────────────────────────────────────────────
      - name: Get plugin version
        id: meta
        run: |
          VERSION=$(grep "^pluginVersion=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=nightshade-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      # ── 7. Guard: Tag must match pluginVersion ────────────────────────────
      - name: Validate tag matches pluginVersion
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-}"
          VERSION="${{ steps.meta.outputs.version }}"
          EXPECTED_TAG="v${VERSION#v}"
          ACTUAL_TAG="v${TAG#v}"

          if [ -z "$TAG" ]; then
            echo "::error::Missing tag from github.ref_name"
            exit 1
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::pluginVersion is empty or missing in gradle.properties"
            exit 1
          fi

          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag '$TAG' does not match pluginVersion '$VERSION'. Expected tag: '$EXPECTED_TAG'."
            exit 1
          fi

          echo "Tag/version check passed: $ACTUAL_TAG"

      # ── 8. GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nightshade Theme v${{ steps.meta.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Nightshade Theme — v${{ steps.meta.outputs.version }}

            ### Installation
            1. Open your JetBrains IDE.
            2. Go to **Settings → Plugins → ⚙ → Install Plugin from Disk…**
            3. Select the downloaded ZIP file and restart the IDE.

            Or search for **Nightshade Theme** directly in the JetBrains Marketplace.
          files: build/distributions/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      # ── 9. (Optional) Sign plugin ─────────────────────────────────────────
      - name: Sign plugin
        run: ./gradlew signPlugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      # ── 10. (Optional) Publish to JetBrains Marketplace ────────────────────
      - name: Publish plugin to Marketplace
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

