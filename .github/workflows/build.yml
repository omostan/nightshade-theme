# ---------------------------------------------------------------------------
# Continuous Integration — runs on every push to main and on all PRs.
# Builds the plugin and uploads the ZIP as a workflow artifact so it can
# be inspected without creating an official release.
# ---------------------------------------------------------------------------
name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ─────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle (with automatic dependency & build caching) ────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'    # used when no wrapper JAR is present
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ── 4. Build ─────────────────────────────────────────────────────────
      - name: Build plugin
        run: gradle buildPlugin

      # ── 5. Artifact ──────────────────────────────────────────────────────
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightshade-theme-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

